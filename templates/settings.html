<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <style>
        :root {
            --sidebar-bg: #0d1b2a;
            --sidebar-hover: #1d3557;
            --main-bg: #f5f7fb;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
            background: var(--main-bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        #sidebar {
            background: var(--sidebar-bg);
            min-height: 100vh;
            width: 250px;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            transition: all .3s ease;
            z-index: 1030;
            overflow-y: auto;
        }

        #sidebar.collapsed {
            width: 80px;
            overflow-x: hidden;
        }

        #sidebar .brand {
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 1.2rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #sidebar .nav-link {
            color: #c9d3e0;
            padding: .75rem 1.2rem;
            border-radius: 8px;
            margin: .15rem .7rem;
            transition: all .2s ease;
            white-space: nowrap;
            overflow: hidden;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            text-decoration: none;
        }

        #sidebar .nav-link i {
            width: 22px;
            text-align: center;
            margin-right: 10px;
            font-size: 1.05rem;
        }

        #sidebar .nav-link:hover,
        #sidebar .nav-link.active {
            background: var(--sidebar-hover);
            color: #fff;
        }

        #sidebar.collapsed .link-text {
            display: none;
        }

        #main-content {
            margin-left: 250px;
            min-height: 100vh;
            transition: all .3s ease;
        }

        #main-content.expanded {
            margin-left: 80px;
        }

        .top-navbar {
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .05);
            padding: .75rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 1020;
            width: 100%;
            box-sizing: border-box;
        }

        .notif-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            position: absolute;
            top: 8px;
            right: 8px;
        }

        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .35);
            z-index: 1020;
            opacity: 0;
            visibility: hidden;
            transition: all .2s ease;
        }

        .sidebar-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        body.sidebar-open {
            overflow: hidden;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, .05);
            background: #fff;
        }

        @media (max-width:991.98px) {
            #sidebar {
                left: -250px;
            }

            #sidebar.show {
                left: 0;
            }

            #main-content {
                margin-left: 0;
            }

            .top-navbar {
                padding-left: 1rem;
                padding-right: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div id="sidebar">
        <div class="brand"><span class="link-text d-flex align-items-center"><img
                    src="{{ url_for('static', filename='images/logo2.png') }}" alt="Logo" width="48" height="48"
                    class="me-2 rounded-circle" />HYRIZON</span></div>
        <ul class="nav flex-column mt-2">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}"><i
                        class="bi bi-speedometer2"></i><span class="link-text">Dashboard</span></a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('resume') }}"><i
                        class="bi bi-file-earmark-text"></i><span class="link-text">Upload Resume</span></a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('job') }}"><i class="bi bi-briefcase"></i><span
                        class="link-text">Job Listing</span></a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('candidates') }}"><i
                        class="bi bi-people"></i><span class="link-text">Candidates</span></a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('analysis') }}"><i class="bi bi-cpu"></i><span
                        class="link-text">Resume Analysis</span></a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('interview') }}"><i
                        class="bi bi-bullseye"></i><span class="link-text">Interview Recommendation</span></a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('analytics') }}"><i
                        class="bi bi-bar-chart"></i><span class="link-text">Analytics</span></a></li>
            <li class="nav-item"><a class="nav-link active" href="{{ url_for('reports') }}"><i
                        class="bi bi-folder2-open"></i><span class="link-text">Reports</span></a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('settings') }}"><i class="bi bi-gear"></i><span
                        class="link-text">Settings</span></a></li>
        </ul>
    </div>
    <div id="main-content">
        <nav class="top-navbar navbar navbar-light bg-white shadow-sm px-3">
            <div class="d-flex align-items-center"><button class="btn btn-outline-secondary me-3" id="toggleSidebar"
                    type="button"><i class="bi bi-list fs-4"></i></button>
                <div class="input-group" style="width:250px;"><span class="input-group-text bg-white"><i
                            class="bi bi-search"></i></span><input type="text" class="form-control"
                        placeholder="Search reports" /></div>
            </div>
            <div class="d-flex align-items-center gap-4">
                <div class="position-relative"><i class="bi bi-bell fs-5"></i><span class="notif-dot"></span></div>
                <div class="dropdown"><a class="d-flex align-items-center text-decoration-none dropdown-toggle" href="#"
                        data-bs-toggle="dropdown"><img src="{{ url_for('static', filename='images/port.JPG') }}"
                            class="rounded-circle me-2" width="36" height="36" alt="profile" /><span
                            class="text-dark fw-semibold">Admin</span></a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#">Profile</a></li>
                        <li><a class="dropdown-item" href="#">Settings</a></li>
                        <li>
                            <hr class="dropdown-divider" />
                        </li>
                        <li><a class="dropdown-item" href="#">Logout</a></li>
                    </ul>
                </div>
            </div>
        </nav>
        <div class="p-4">
            <div class="card p-4">
                <h2 class="fw-bold mb-3">Settings</h2>
                <p class="text-muted mb-0">Customize your profile, system preferences, and application settings.</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>const sidebar = document.getElementById('sidebar'); const mainContent = document.getElementById('main-content'); const toggleSidebarButton = document.getElementById('toggleSidebar'); const sidebarOverlay = document.getElementById('sidebarOverlay'); const sidebarStateKey = 'hyrizon-sidebar-state'; function closeMobileSidebar() { sidebar.classList.remove('show'); sidebarOverlay.classList.remove('show'); document.body.classList.remove('sidebar-open'); } function openMobileSidebar() { sidebar.classList.add('show'); sidebarOverlay.classList.add('show'); document.body.classList.add('sidebar-open'); } function setDesktopSidebarState(isCollapsed) { sidebar.classList.toggle('collapsed', isCollapsed); mainContent.classList.toggle('expanded', isCollapsed); toggleSidebarButton.setAttribute('aria-expanded', String(!isCollapsed)); localStorage.setItem(sidebarStateKey, isCollapsed ? 'collapsed' : 'expanded'); } function applySavedSidebarState() { const saved = localStorage.getItem(sidebarStateKey); if (window.innerWidth >= 992) setDesktopSidebarState(saved === 'collapsed'); } function handleSidebarToggle() { if (window.innerWidth >= 992) { const isCollapsed = !sidebar.classList.contains('collapsed'); setDesktopSidebarState(isCollapsed); } else { if (sidebar.classList.contains('show')) closeMobileSidebar(); else openMobileSidebar(); } } toggleSidebarButton?.addEventListener('click', handleSidebarToggle); sidebarOverlay?.addEventListener('click', closeMobileSidebar); window.addEventListener('resize', function () { if (window.innerWidth >= 992) { sidebar.classList.remove('show'); sidebarOverlay.classList.remove('show'); document.body.classList.remove('sidebar-open'); applySavedSidebarState(); } else { sidebar.classList.remove('collapsed'); mainContent.classList.remove('expanded'); toggleSidebarButton.setAttribute('aria-expanded', 'false'); } }); applySavedSidebarState(); if (window.innerWidth < 992) closeMobileSidebar();</script>
</body>

</html>
